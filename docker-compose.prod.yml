# Despliegue en producción (VPS): app (FastAPI+Angular) detrás de Caddy con HTTPS automático.
services:
  app:
    build: .
    container_name: lusan-app
    restart: unless-stopped
    environment:
      PORT: "8000"
      CORS_ORIGINS: "https://lusanautoservicio.com.ar,https://www.lusanautoservicio.com.ar"
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    container_name: lusan-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
