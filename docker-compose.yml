services:
  backend:
    build:
      context: ./backend
    container_name: lusan-backend
    environment:
      CORS_ORIGINS: http://localhost,http://localhost:8080
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: lusan-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
